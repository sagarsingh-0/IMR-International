kind = "web"
previewPath = "/"
title = "IMR International"
version = "1.0.0"
id = "artifacts/imr-international"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 22726
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/imr-international run dev"

[services.env]
PORT = "22726"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/imr-international", "run", "build"]
publicDir = "artifacts/imr-international/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
